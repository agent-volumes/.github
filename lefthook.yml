# Lefthook pre-commit configuration
# Documentation: https://lefthook.dev/configuration/

commit-msg:
  commands:
    dco-signoff:
      run: |
        if ! grep -qE "^Signed-off-by: " "{1}"; then
          echo "❌ DCO sign-off missing"
          echo "   Commit message must include a 'Signed-off-by:' line."
          echo "   Use 'git commit -s' to sign off automatically."
          echo "   See CONTRIBUTING.md § Commit Sign-Off (DCO) for details."
          exit 1
        fi
      fail_text: "Missing DCO sign-off. Run 'git commit -s' to sign off."

pre-commit:
  parallel: true
  jobs:
    - name: Lint and format Markdown
      glob: '*.{md,mdx}'
      run: |
        set -e
        echo "🔍 Running markdownlint-cli2 --fix on staged files..."
        bunx markdownlint-cli2 --fix {staged_files}
        echo "✨ Running prettier --write on staged files..."
        bunx prettier --write {staged_files}
        echo "📦 Re-staging fixed files..."
        git add {staged_files}
        echo "✅ Pre-commit checks completed!"

    - name: Format config files
      glob: '*.{yml,yaml,json,jsonc,mjs}'
      run: |
        set -e
        echo "✨ Running prettier --write on staged config files..."
        bunx prettier --write {staged_files}
        echo "📦 Re-staging formatted config files..."
        git add {staged_files}
        echo "✅ Config formatting complete!"

    - name: Optimize SVG assets
      glob: 'assets/logo/src/**/*.svg'
      run: |
        set -e
        echo "🧹 Formatting source SVG files for readability..."
        bunx prettier --write {staged_files}
        echo "📦 Re-staging formatted source SVG files..."
        git add {staged_files}
        echo "🎨 Optimizing SVG source files to deploy versions..."
        bunx svgo -f assets/logo/src --recursive -o assets/logo --config=svgo.config.mjs
        echo "📦 Re-staging optimized SVG files..."
        git add assets/logo/**/*.svg
        echo "✅ SVG optimization complete!"
