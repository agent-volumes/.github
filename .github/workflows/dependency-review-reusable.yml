name: Dependency Review

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      config-file:
        description: 'Path to the dependency review configuration file'
        required: false
        type: string
        default: 'agent-volumes/.github/.github/dependency-review-config.yml@main'
      fail-on-severity:
        description: 'Minimum severity to fail the check (low, moderate, high, critical)'
        required: false
        type: string
        default: ''
      comment-summary-in-pr:
        description: 'Post summary comment to PR (always, on-failure, never)'
        required: false
        type: string
        default: 'on-failure'
      warn-only:
        description: 'Report only, never fail'
        required: false
        type: boolean
        default: false
      external-repo-token:
        description: 'Token for accessing external repository config files'
        required: false
        type: string
        default: ''

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required when comment-summary-in-pr is enabled
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          config-file: ${{ inputs.config-file }}
          comment-summary-in-pr: ${{ inputs.comment-summary-in-pr }}
          warn-only: ${{ inputs.warn-only }}
          fail-on-severity: ${{ inputs.fail-on-severity }}
          external-repo-token: ${{ inputs.external-repo-token }}
