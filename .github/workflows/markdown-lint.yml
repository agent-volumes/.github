name: Markdown lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.mdx'
      - '.github/workflows/markdown-lint.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '**/*.mdx'
      - '.github/workflows/markdown-lint.yml'

jobs:
  markdown:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Lint Markdown with markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          config: .markdownlint-cli2.jsonc
          globs: |
            **/*.md
            **/*.mdx

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          package-manager-cache: false

      - name: Check Markdown formatting with Prettier
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          files=()
          while IFS= read -r file; do
            files+=("$file")
          done < <(git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$GITHUB_SHA" -- '*.md' '*.mdx')

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Markdown files changed."
            exit 0
          fi

          npx --yes prettier@3.6.2 --check "${files[@]}"
