name: OSV Scanner Full

on:
  workflow_call:
    inputs:
      scan-args:
        description: 'Additional scan arguments, one per line. Do not set --format or --output.'
        required: false
        type: string
        default: |-
          --recursive
          ./
      results-file-name:
        description: 'SARIF results file name'
        required: false
        type: string
        default: 'results.sarif'
      download-artifact:
        description: 'Optional artifact name to download before scanning'
        required: false
        type: string
        default: ''
      ref:
        description: 'Optional branch, tag, or commit to scan'
        required: false
        type: string
        default: ''
      upload-sarif:
        description: 'Upload SARIF to code scanning when available for this repository'
        required: false
        type: boolean
        default: true
      fail-on-vuln:
        description: 'Fail when vulnerabilities are found'
        required: false
        type: boolean
        default: true
      checkout-submodules:
        description: 'Checkout git submodules'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  scan-full:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: ${{ inputs.checkout-submodules }}
          ref: ${{ inputs.ref }}

      - name: Download custom artifact if specified
        if: ${{ inputs.download-artifact != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: ${{ inputs.download-artifact }}
          path: ./

      - name: Run scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --output=results.json
            --format=json
            ${{ inputs.scan-args }}

      - name: Build SARIF report
        uses: google/osv-scanner-action/osv-reporter-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --output=${{ inputs.results-file-name }}
            --new=results.json
            --gh-annotations=false
            --fail-on-vuln=${{ inputs.fail-on-vuln }}

      - name: Upload SARIF to code scanning
        if: ${{ inputs.upload-sarif }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: ${{ inputs.results-file-name }}
