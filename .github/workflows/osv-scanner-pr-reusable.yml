name: OSV Scanner PR

on:
  workflow_call:
    inputs:
      scan-args:
        description: 'Additional scan arguments, one per line. Do not set --format or --output.'
        required: false
        type: string
        default: |-
          --recursive
          ./
      results-file-name:
        description: 'SARIF results file name'
        required: false
        type: string
        default: 'results.sarif'
      upload-sarif:
        description: 'Upload SARIF to code scanning when available for this repository'
        required: false
        type: boolean
        default: true
      fail-on-vuln:
        description: 'Fail when the pull request introduces new vulnerabilities'
        required: false
        type: boolean
        default: true
      checkout-submodules:
        description: 'Checkout git submodules'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  scan-pr:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: ${{ inputs.checkout-submodules }}

      - name: Checkout target branch
        run: |
          git checkout "$GITHUB_BASE_REF"
          git submodule update --recursive

      - name: Run scanner on base branch
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=old-results.json
            ${{ inputs.scan-args }}

      - name: Checkout current branch
        run: |
          git checkout -f "$GITHUB_SHA"
          git submodule update --recursive

      - name: Run scanner on PR branch
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --format=json
            --output=new-results.json
            ${{ inputs.scan-args }}

      - name: Build SARIF report
        uses: google/osv-scanner-action/osv-reporter-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --output=${{ inputs.results-file-name }}
            --old=old-results.json
            --new=new-results.json
            --gh-annotations=true
            --fail-on-vuln=${{ inputs.fail-on-vuln }}

      - name: Upload SARIF to code scanning
        if: ${{ inputs.upload-sarif }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: ${{ inputs.results-file-name }}
